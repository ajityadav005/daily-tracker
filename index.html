<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Tracker">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
<title>Daily Tracker</title>
<style>
:root {
  --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #085041;
  --text: #1a1a1a; --text2: #555; --text3: #999;
  --bg: #f7f7f5; --surface: #ffffff; --border: rgba(0,0,0,0.1);
  --radius: 12px; --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --text: #f0f0f0; --text2: #aaa; --text3: #666;
    --bg: #111; --surface: #1e1e1e; --border: rgba(255,255,255,0.1);
    --green-light: #0a3328;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }

/* Top bar */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: calc(var(--safe-top) + 12px) 16px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar h1 { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.topbar h1 span { background: var(--green); color: white; width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.btn-add { background: var(--green); color: white; border: none; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; }

/* Tabs */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 11px 4px; font-size: 13px; font-weight: 500; color: var(--text3); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab.active { color: var(--green); border-bottom-color: var(--green); }

/* Content */
.content { padding: 14px 14px calc(var(--safe-bottom) + 80px); }
.section { display: none; }
.section.active { display: block; }

/* Cards */
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
.card-desc { font-size: 12px; color: var(--text2); margin-bottom: 10px; }

/* Badge */
.badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
.badge-yes { background: var(--green-light); color: var(--green-dark); }
.badge-no { background: var(--bg); color: var(--text3); border: 1px solid var(--border); }
.badge-pending { background: #FFF8E1; color: #9E6C00; }

/* Action buttons */
.actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.btn-yes { background: var(--green); color: white; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; flex: 1; }
.btn-no { background: var(--bg); color: var(--text2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; flex: 1; }
.btn-undo { background: none; color: var(--text3); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 12px; cursor: pointer; }
.btn-del { background: none; color: #cc4444; border: none; font-size: 18px; cursor: pointer; padding: 4px; line-height: 1; opacity: 0.7; }

/* Counter */
.counter { display: flex; align-items: center; gap: 0; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
.counter button { background: none; border: none; width: 40px; height: 38px; font-size: 20px; cursor: pointer; color: var(--text); font-weight: 500; }
.counter span { flex: 1; text-align: center; font-size: 15px; font-weight: 600; min-width: 40px; }

/* Reminder tag */
.reminder-tag { font-size: 11px; color: var(--text3); margin-top: 6px; display: flex; align-items: center; gap: 3px; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat { background: var(--surface); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); }
.stat-val { font-size: 24px; font-weight: 700; color: var(--green); }
.stat-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Calendar */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav span { font-size: 14px; font-weight: 600; }
.cal-nav button { background: none; border: 1px solid var(--border); border-radius: 6px; width: 30px; height: 30px; cursor: pointer; color: var(--text2); font-size: 14px; }
.cal-head { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; }
.cal-head div { text-align: center; font-size: 10px; color: var(--text3); font-weight: 600; padding: 3px 0; }
.cal-body { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-cell { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
.cal-cell.yes { background: var(--green); color: white; }
.cal-cell.no { background: var(--bg); color: var(--text3); }
.cal-cell.today-cell { outline: 2px solid var(--green); outline-offset: -2px; }
.cal-cell.empty, .cal-cell.future { background: none; color: var(--text3); opacity: 0.4; }

/* Add form overlay */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; }
.overlay.open { display: flex; }
.sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 18px calc(var(--safe-bottom) + 20px); width: 100%; max-height: 90vh; overflow-y: auto; }
.sheet h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
.form-row input, .form-row select, .form-row textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; }
.form-row textarea { resize: vertical; min-height: 64px; }
.form-btns { display: flex; gap: 10px; margin-top: 6px; }
.btn-create { background: var(--green); color: white; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; flex: 1; }
.btn-cancel { background: var(--bg); color: var(--text2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }

/* Notification banner */
.notif-bar { background: #FFF8E1; border: 1px solid #FFD54F; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #7A5800; display: none; align-items: center; gap: 8px; }
.notif-bar.show { display: flex; }

/* Empty */
.empty { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-icon { font-size: 44px; margin-bottom: 10px; }
.empty p { font-size: 14px; }

/* Notif perm */
.perm-bar { background: var(--green-light); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--green-dark); }
.perm-bar button { background: var(--green); color: white; border: none; border-radius: 7px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.tracker-select { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; margin-bottom: 14px; }

/* Install banner */
.install-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; display: none; align-items: center; gap: 10px; font-size: 13px; }
.install-bar.show { display: flex; }
.install-bar button { background: var(--green); color: white; border: none; border-radius: 7px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="topbar">
  <h1><span>✓</span> Daily Tracker</h1>
  <button class="btn-add" onclick="openSheet()">＋ Add</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('today',this)">Today</button>
  <button class="tab" onclick="switchTab('history',this)">History</button>
  <button class="tab" onclick="switchTab('summary',this)">Summary</button>
</div>

<div class="content">
  <!-- Today -->
  <div id="today" class="section active">
    <div id="notifBar" class="notif-bar">⏰ <span id="notifMsg"></span></div>
    <div id="permBar" class="perm-bar" style="display:none">
      🔔 Enable notifications to get reminders even when the app is closed.
      <button onclick="requestNotifPerm()">Enable</button>
    </div>
    <div id="installBar" class="install-bar">
      📲 <span>Add to Home Screen for the best experience.</span>
      <button id="installBtn">Install</button>
    </div>
    <div id="todayList"></div>
  </div>

  <!-- History -->
  <div id="history" class="section">
    <div class="card">
      <select class="tracker-select" id="histSel" onchange="renderCal()"></select>
      <div class="cal-nav">
        <button onclick="chMonth(-1)">‹</button>
        <span id="monthLabel"></span>
        <button onclick="chMonth(1)">›</button>
      </div>
      <div class="cal-head">
        <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
      </div>
      <div class="cal-body" id="calBody"></div>
    </div>
    <div class="stats-grid" id="histStats"></div>
  </div>

  <!-- Summary -->
  <div id="summary" class="section">
    <div id="summaryList"></div>
  </div>
</div>

<!-- Add tracker sheet -->
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="sheet">
    <h2>New tracker</h2>
    <div class="form-row">
      <label>Name *</label>
      <input type="text" id="fName" placeholder="e.g. Lunch, Water, Walk...">
    </div>
    <div class="form-row">
      <label>Description</label>
      <textarea id="fDesc" placeholder="e.g. Office canteen – billed monthly"></textarea>
    </div>
    <div class="form-row">
      <label>Type</label>
      <select id="fType">
        <option value="daily">Daily yes / no</option>
        <option value="count">Daily count</option>
      </select>
    </div>
    <div class="form-row">
      <label>Unit (for counts)</label>
      <input type="text" id="fUnit" placeholder="e.g. glasses, steps, km">
    </div>
    <div class="form-row">
      <label>Reminder time</label>
      <input type="time" id="fTime">
    </div>
    <div class="form-btns">
      <button class="btn-create" onclick="addTracker()">Create</button>
      <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const LS_T = 'dt2_trackers', LS_L = 'dt2_logs';
let trackers = [], logs = {};
let calM = new Date().getMonth(), calY = new Date().getFullYear();
let deferredInstall = null;

function load() {
  try { trackers = JSON.parse(localStorage.getItem(LS_T) || '[]'); } catch(e) { trackers = []; }
  try { logs = JSON.parse(localStorage.getItem(LS_L) || '{}'); } catch(e) { logs = {}; }
  if (!trackers.length) {
    trackers = [{id:'lunch', name:'Lunch', desc:'Office canteen lunch – billed monthly', type:'daily', unit:'meal', time:'13:00'}];
    save();
  }
}
function save() {
  localStorage.setItem(LS_T, JSON.stringify(trackers));
  localStorage.setItem(LS_L, JSON.stringify(logs));
  syncSWReminders();
}

// ── Date helpers ───────────────────────────────────────────────────────────
function todayKey() { return new Date().toISOString().slice(0,10); }
function dk(d) { return d.toISOString().slice(0,10); }
function getLog(tid, date) { return (logs[tid] || {})[date]; }
function setLog(tid, date, val) {
  if (!logs[tid]) logs[tid] = {};
  if (val === null) { delete logs[tid][date]; } else { logs[tid][date] = val; }
  save();
}

// ── Today ──────────────────────────────────────────────────────────────────
function renderToday() {
  const today = todayKey();
  const el = document.getElementById('todayList');
  if (!trackers.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>No trackers yet.<br>Tap <b>+ Add</b> to create one.</p></div>`;
    return;
  }
  el.innerHTML = trackers.map(tr => {
    const log = getLog(tr.id, today);
    const logged = log !== undefined && log !== null;
    let badge = '', actions = '';
    if (tr.type === 'daily') {
      if (!logged) {
        badge = `<span class="badge badge-pending">Pending</span>`;
        actions = `<button class="btn-yes" onclick="logYes('${tr.id}')">✓ Yes</button>
                   <button class="btn-no" onclick="logNo('${tr.id}')">✗ No</button>`;
      } else if (log === true) {
        badge = `<span class="badge badge-yes">✓ Done</span>`;
        actions = `<button class="btn-undo" onclick="clearLog('${tr.id}')">Undo</button>`;
      } else {
        badge = `<span class="badge badge-no">Skipped</span>`;
        actions = `<button class="btn-undo" onclick="clearLog('${tr.id}')">Undo</button>`;
      }
    } else {
      const cur = log || 0;
      badge = cur > 0 ? `<span class="badge badge-yes">${cur} ${tr.unit||''}</span>` : `<span class="badge badge-pending">0 ${tr.unit||''}</span>`;
      actions = `<div class="counter">
        <button onclick="adj('${tr.id}',-1)">−</button>
        <span>${cur}</span>
        <button onclick="adj('${tr.id}',1)">＋</button>
      </div>`;
    }
    const remStr = tr.time ? `<div class="reminder-tag">🔔 Reminder at ${tr.time}</div>` : '';
    return `<div class="card">
      <div class="card-title">
        <span>${esc(tr.name)} ${badge}</span>
        <button class="btn-del" onclick="delTracker('${tr.id}')" aria-label="Delete">×</button>
      </div>
      ${tr.desc ? `<div class="card-desc">${esc(tr.desc)}</div>` : ''}
      ${remStr}
      <div class="actions" style="margin-top:10px">${actions}</div>
    </div>`;
  }).join('');
  checkReminderBanner();
}

function logYes(id) { setLog(id, todayKey(), true); renderToday(); renderSummary(); }
function logNo(id)  { setLog(id, todayKey(), false); renderToday(); renderSummary(); }
function clearLog(id) { setLog(id, todayKey(), null); renderToday(); renderSummary(); }
function adj(id, d) {
  const cur = getLog(id, todayKey()) || 0;
  setLog(id, todayKey(), Math.max(0, cur + d));
  renderToday(); renderSummary();
}

function checkReminderBanner() {
  const now = new Date();
  const hhmm = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const today = todayKey();
  const due = trackers.filter(t => t.time && t.time === hhmm && getLog(t.id, today) === undefined);
  const bar = document.getElementById('notifBar');
  if (due.length) {
    document.getElementById('notifMsg').textContent = `Time to log: ${due.map(t=>t.name).join(', ')}`;
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}

// ── Tracker CRUD ───────────────────────────────────────────────────────────
function addTracker() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('Please enter a name.'); return; }
  trackers.push({
    id: 'tr_' + Date.now(),
    name,
    desc: document.getElementById('fDesc').value.trim(),
    type: document.getElementById('fType').value,
    unit: document.getElementById('fUnit').value.trim() || 'entries',
    time: document.getElementById('fTime').value
  });
  save();
  closeSheet();
  renderToday();
  renderHistSel();
  renderSummary();
  document.getElementById('fName').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fUnit').value = '';
  document.getElementById('fTime').value = '';
}

function delTracker(id) {
  if (!confirm('Delete this tracker and all its data?')) return;
  trackers = trackers.filter(t => t.id !== id);
  delete logs[id];
  save();
  renderToday();
  renderHistSel();
  renderSummary();
}

// ── History / Calendar ─────────────────────────────────────────────────────
function renderHistSel() {
  const sel = document.getElementById('histSel');
  sel.innerHTML = trackers.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');
}

function renderCal() {
  const sel = document.getElementById('histSel');
  if (!sel.value || !trackers.length) return;
  const tr = trackers.find(t => t.id === sel.value);
  if (!tr) return;
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('monthLabel').textContent = `${months[calM]} ${calY}`;
  const firstDay = new Date(calY, calM, 1).getDay();
  const daysInM = new Date(calY, calM+1, 0).getDate();
  const todayStr = todayKey();
  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += '<div class="cal-cell empty"></div>';
  for (let d = 1; d <= daysInM; d++) {
    const dt = new Date(calY, calM, d);
    const key = dk(dt);
    const isFuture = dt > new Date();
    const isToday = key === todayStr;
    const log = getLog(tr.id, key);
    let cls = 'cal-cell';
    if (isFuture) cls += ' future';
    else if (log === true || (tr.type==='count' && log > 0)) cls += ' yes';
    else if (log === false || log === 0) cls += ' no';
    else cls += ' future';
    if (isToday) cls += ' today-cell';
    cells += `<div class="${cls}" title="${key}">${d}</div>`;
  }
  document.getElementById('calBody').innerHTML = cells;

  // Monthly stats
  const monthPrefix = `${calY}-${String(calM+1).padStart(2,'0')}`;
  const tLogs = logs[tr.id] || {};
  const monthKeys = Object.keys(tLogs).filter(k => k.startsWith(monthPrefix));
  const yesCount = monthKeys.filter(k => tLogs[k] === true || (tr.type==='count' && tLogs[k] > 0)).length;
  const noCount  = monthKeys.filter(k => tLogs[k] === false || tLogs[k] === 0).length;
  const total = tr.type === 'count' ? monthKeys.reduce((s,k) => s + (tLogs[k]||0), 0) : null;
  document.getElementById('histStats').innerHTML = `
    <div class="stat"><div class="stat-val">${yesCount}</div><div class="stat-lbl">Taken this month</div></div>
    <div class="stat"><div class="stat-val">${noCount}</div><div class="stat-lbl">Skipped this month</div></div>
    ${total !== null ? `<div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Total ${tr.unit||''}</div></div>` : ''}
  `;
}

function chMonth(d) {
  calM += d;
  if (calM < 0) { calM = 11; calY--; }
  if (calM > 11) { calM = 0; calY++; }
  renderCal();
}

// ── Summary ────────────────────────────────────────────────────────────────
function renderSummary() {
  const el = document.getElementById('summaryList');
  if (!trackers.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><p>No trackers yet.</p></div>`;
    return;
  }
  const today = new Date();
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  el.innerHTML = trackers.map(tr => {
    const tLogs = logs[tr.id] || {};
    let thisMonth = 0, allTime = 0, streak = 0;
    Object.keys(tLogs).forEach(k => {
      const hit = tLogs[k] === true || (tr.type==='count' && tLogs[k] > 0);
      if (hit) { allTime++; if (new Date(k) >= monthStart) thisMonth++; }
    });
    for (let i = 0; i < 365; i++) {
      const d = new Date(today); d.setDate(d.getDate()-i);
      const v = tLogs[dk(d)];
      if (v === true || (tr.type==='count' && v > 0)) streak++;
      else if (v !== undefined) break;
      else if (i > 0) break;
    }
    return `<div class="card">
      <div class="card-title" style="margin-bottom:12px">${esc(tr.name)}</div>
      <div class="stats-grid" style="margin-bottom:0">
        <div class="stat"><div class="stat-val">${thisMonth}</div><div class="stat-lbl">This month</div></div>
        <div class="stat"><div class="stat-val">${allTime}</div><div class="stat-lbl">All time</div></div>
        <div class="stat"><div class="stat-val">${streak}</div><div class="stat-lbl">Day streak 🔥</div></div>
        <div class="stat"><div class="stat-val" style="font-size:15px">${tr.time||'—'}</div><div class="stat-lbl">Reminder</div></div>
      </div>
    </div>`;
  }).join('');
}

// ── Tabs / Sheet ───────────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'history') { renderHistSel(); renderCal(); }
  if (id === 'summary') renderSummary();
}
function openSheet() { document.getElementById('overlay').classList.add('open'); }
function closeSheet(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

// ── Notifications ──────────────────────────────────────────────────────────
async function requestNotifPerm() {
  const perm = await Notification.requestPermission();
  document.getElementById('permBar').style.display = 'none';
  if (perm === 'granted') {
    syncSWReminders();
    alert('Notifications enabled! You will be reminded at your set times.');
  }
}

function syncSWReminders() {
  if (!navigator.serviceWorker || !navigator.serviceWorker.controller) return;
  const reminders = trackers.filter(t => t.time).map(t => ({ id: t.id, name: t.name, time: t.time }));
  navigator.serviceWorker.controller.postMessage({ type: 'SCHEDULE_NOTIFICATIONS', reminders });
}

function showPermBar() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('permBar').style.display = 'flex';
  }
}

// ── Service Worker ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('SW registered');
    // Try periodic sync
    if ('periodicSync' in reg) {
      reg.periodicSync.register('check-reminders', { minInterval: 60 * 1000 }).catch(() => {});
    }
    // Alarm-based fallback: check every minute via setInterval
    setInterval(checkAlarms, 60000);
    setTimeout(syncSWReminders, 1000);
  });
}

async function checkAlarms() {
  if (Notification.permission !== 'granted') return;
  const now = new Date();
  const hhmm = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const today = todayKey();
  for (const tr of trackers) {
    if (tr.time === hhmm && getLog(tr.id, today) === undefined) {
      new Notification('Daily Tracker', {
        body: `⏰ Time to log: ${tr.name}`,
        icon: './icons/icon-192x192.png',
        tag: tr.id
      });
    }
  }
}

// ── Install prompt ─────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  document.getElementById('installBar').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  const { outcome } = await deferredInstall.userChoice;
  if (outcome === 'accepted') document.getElementById('installBar').classList.remove('show');
  deferredInstall = null;
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBar').classList.remove('show');
});

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ───────────────────────────────────────────────────────────────────
load();
renderToday();
showPermBar();
setInterval(checkReminderBanner, 30000);
</script>
